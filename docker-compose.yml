services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: battery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: battery_admin
      POSTGRES_PASSWORD: change_me_in_env_file
      POSTGRES_DB: battery_health
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battery_admin -d battery_health"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: battery-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://battery_admin:change_me_in_env_file@db:5432/battery_health
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Faz 1-2'de Dockerfile ve app kodu eklendiğinde aktif olacak

  # Faz 5'te eklenecek:
  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  db_data:
